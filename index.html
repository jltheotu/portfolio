    <div id="lightbox" class="lightbox" onclick="closeLightbox()">

    <script>
        const sliderIds = ['slider1', 'slider2', 'slider3'];
        let slidersData = [];
        let preventLightbox = false; 

        // --- CURSEUR ---
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.querySelectorAll('a, button, .thumb').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'translate(-50%, -50%) scale(1.5)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');
        });

        // --- REVEAL ---
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            reveals.forEach(r => {
                const windowHeight = window.innerHeight;
                const elementTop = r.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) { r.classList.add("active"); }
            });
        }
        window.addEventListener("scroll", reveal);

        // --- FONCTION POUR CALCULER LA LARGEUR DYNAMIQUE (PC vs MOBILE) ---
        function getItemWidth(sliderElement) {
            const gap = window.innerWidth <= 768 ? 15 : 25; // S'adapte au CSS
            const img = sliderElement.querySelector('img');
            return (img ? img.offsetWidth : 350) + gap;
        }

        // --- SLIDERS (AVEC DRAG-TO-SCROLL MULTIPLE) ---
        function initSliders() {
            sliderIds.forEach((id, i) => {
                const slider = document.getElementById(id);
                if (!slider) return;
                
                slider.querySelectorAll('img').forEach(img => img.setAttribute('draggable', false));

                const items = slider.querySelectorAll('img');
                const totalItems = items.length;
                const fClones = Array.from(items).map(el => el.cloneNode(true));
                const lClones = Array.from(items).map(el => el.cloneNode(true));
                fClones.forEach(c => slider.insertBefore(c, slider.firstChild));
                lClones.forEach(c => slider.appendChild(c));
                
                slidersData[i] = { 
                    element: slider, 
                    total: totalItems, 
                    index: totalItems, 
                    isMoving: false,
                    isDragging: false,
                    startX: 0,
                    currentTranslate: 0,
                    draggedPixels: 0
                };
                updateSliderPosition(i, false);

                // --- GESTION DU DRAG ---
                const container = slider.parentElement;

                container.addEventListener('pointerdown', (e) => {
                    if (slidersData[i].isMoving) return;
                    slidersData[i].isDragging = true;
                    slidersData[i].draggedPixels = 0;
                    slidersData[i].startX = e.clientX;
                    slider.style.transition = 'none'; 
                    
                    const itemWidth = getItemWidth(slider);
                    slidersData[i].currentTranslate = -slidersData[i].index * itemWidth;
                });

                container.addEventListener('pointermove', (e) => {
                    if (!slidersData[i].isDragging) return;
                    slidersData[i].draggedPixels = e.clientX - slidersData[i].startX;
                    slider.style.transform = `translateX(${slidersData[i].currentTranslate + slidersData[i].draggedPixels}px)`;
                });

                const endDrag = () => {
                    if (!slidersData[i].isDragging) return;
                    slidersData[i].isDragging = false;
                    
                    const movedBy = slidersData[i].draggedPixels;
                    const itemWidth = getItemWidth(slider);
                    
                    // Calcule combien d'affiches on a traversées
                    const slidesMoved = Math.round(-movedBy / itemWidth);

                    if (slidesMoved !== 0) {
                        moveSlide(i, slidesMoved);
                    } else {
                        updateSliderPosition(i, true);
                    }

                    if (Math.abs(movedBy) > 10) {
                        preventLightbox = true;
                        setTimeout(() => preventLightbox = false, 50);
                    }
                };

                container.addEventListener('pointerup', endDrag);
                container.addEventListener('pointerleave', endDrag);
                container.addEventListener('pointercancel', endDrag);
            });
        }

        function updateSliderPosition(sID, animate = true) {
            const data = slidersData[sID];
            const itemWidth = getItemWidth(data.element); 
            data.element.style.transition = animate ? "transform 1s cubic-bezier(0.23, 1, 0.32, 1)" : "none";
            data.element.style.transform = `translateX(${-data.index * itemWidth}px)`;
        }

        function moveSlide(sID, direction) {
            const data = slidersData[sID];
            if (!data || data.isMoving) return;
            data.isMoving = true;
            data.index += direction;
            updateSliderPosition(sID, true);
            
            setTimeout(() => {
                if (data.index >= data.total * 2) { 
                    data.index = data.index - data.total; 
                    updateSliderPosition(sID, false); 
                } 
                else if (data.index <= data.total - 1) { 
                    data.index = data.index + data.total; 
                    updateSliderPosition(sID, false); 
                }
                data.isMoving = false;
            }, 1000);
        }

        // --- LIGHTBOX ---
        function openLightbox(src) {
            if (preventLightbox) return; 
            const lb = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lb.style.display = 'flex';
            setTimeout(() => lb.classList.add('active'), 10);
        }
        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            setTimeout(() => lb.style.display = 'none', 300);
        }

        // --- FORM & SUCCESS OVERLAY ---
        async function handleFormSubmit() {
            const form = document.getElementById("contact-form");
            const overlay = document.getElementById("success-overlay");

            form.addEventListener("submit", async (e) => {
                e.preventDefault(); 
                const btn = form.querySelector("button");
                btn.innerText = "Envoi...";
                try {
                    const response = await fetch(form.action, { 
                        method: 'POST', 
                        body: new FormData(form), 
                        headers: {'Accept': 'application/json'} 
                    });
                    if (response.ok) { 
                        overlay.style.display = 'flex';
                        setTimeout(() => overlay.classList.add('active'), 10);
                        form.reset(); 
                    }
                } catch (e) { console.error(e); }
                btn.innerText = "Envoyer";
            });
        }

        function closeSuccess() {
            const overlay = document.getElementById("success-overlay");
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        document.addEventListener('click', (e) => {
            const overlay = document.getElementById("success-overlay");
            if(overlay.classList.contains('active') && e.target !== overlay && !overlay.contains(e.target)) {
                closeSuccess();
            }
        }, true);

        window.onload = () => { initSliders(); handleFormSubmit(); reveal(); };
    </script>
